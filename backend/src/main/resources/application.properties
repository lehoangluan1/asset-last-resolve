spring.application.name=last-resolve

server.port=${SERVER_PORT:8080}

app.database.url=${DB_URL:postgresql://neondb_owner:npg_tKFH3sduf4BR@ep-proud-sky-a1p8p02w-pooler.ap-southeast-1.aws.neon.tech/asset_management?sslmode=require&channel_binding=require}
app.database.username=${DB_USERNAME:}
app.database.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.http.converters.preferred-json-mapper=jackson2

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

app.security.jwt.secret=${JWT_SECRET:change-this-demo-jwt-secret-to-a-long-random-value-1234567890}
app.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:28800}
app.security.jwt.allow-demo-secret=${JWT_ALLOW_DEMO_SECRET:true}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app}
