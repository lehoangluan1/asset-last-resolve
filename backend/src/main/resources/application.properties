spring.application.name=last-resolve

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:asset_management}}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.http.converters.preferred-json-mapper=jackson2

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

app.security.jwt.secret=${JWT_SECRET:change-this-demo-jwt-secret-to-a-long-random-value-1234567890}
app.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:28800}
app.security.jwt.allow-demo-secret=${JWT_ALLOW_DEMO_SECRET:true}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:}
