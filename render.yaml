services:
  - type: web
    name: asset-management-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: 10000
      - key: JWT_ALLOW_DEMO_SECRET
        value: "false"
      - key: JWT_SECRET
        sync: false
      - key: DB_URL
        value: postgresql://neondb_owner:npg_tKFH3sduf4BR@ep-proud-sky-a1p8p02w-pooler.ap-southeast-1.aws.neon.tech/asset_management?sslmode=require&channel_binding=require
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        value: https://*.onrender.com

  - type: static
    name: asset-management-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_APP_BASE_PATH
        value: /
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
