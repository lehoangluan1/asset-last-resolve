name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend unit and integration tests
        run: ./backend/mvnw -f backend/pom.xml verify

  frontend:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 23.11.0
        uses: actions/setup-node@v4
        with:
          node-version: "23.11.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Run frontend unit tests
        run: npm --prefix frontend run test:unit

      - name: Build frontend production bundle
        run: npm --prefix frontend run build

  e2e:
    name: End-to-End Smoke Tests
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 23.11.0
        uses: actions/setup-node@v4
        with:
          node-version: "23.11.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright browser
        run: npm --prefix frontend exec playwright install --with-deps chromium

      - name: Run Playwright end-to-end tests
        run: npm --prefix frontend run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
