services:
  postgres:
    image: postgres:16-alpine
    container_name: asset-mgmt-postgres
    environment:
      POSTGRES_DB: asset_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d asset_management"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: asset-mgmt-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/asset_management
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-this-demo-jwt-secret-to-a-long-random-value-1234567890
      JWT_ALLOW_DEMO_SECRET: true
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_APP_BASE_PATH: /
    container_name: asset-mgmt-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres-data:
